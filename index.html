<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Copa 2026 | Diego</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/main.css">
</head>

<body>

<header class="topbar">
  <div class="brand">
    <h1>Copa do Mundo 2026</h1>
    <span>Simulador da Copa do Mundo FIFA™ by Diego Lima</span>
  </div>

  <div class="top-actions">
    <button id="themeBtn">🌙 Tema</button>
    <button id="resetTournamentBtn">Limpar Simulação</button>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" data-tab="games">Jogos</button>
  <button class="tab" data-tab="groups">Grupos</button>
  <button class="tab" data-tab="knockout">Mata-Mata</button>
  <button class="tab" data-tab="stats">Estatísticas</button>
</nav>

<main>

  <section class="dashboard">

    <div class="metric-card">
    <span class="metric-value" id="gamesCount">0</span>
    <span class="metric-label">Jogos simulados</span>
    </div>

  <div class="metric-card">
    <span class="metric-value" id="progressValue">0%</span>
    <span class="metric-label">Progresso</span>
  </div>

  <div class="metric-card">
    <span class="metric-value" id="dashboardGoals">0</span>
    <span class="metric-label">Gols marcados</span>
  </div>

  <div class="metric-card">
    <span class="metric-value" id="avgGoals">0.00</span>
    <span class="metric-label">Média de gols</span>
  </div>

  <div class="metric-card">
    <span class="metric-value" id="bestAttack">-</span>
    <span class="metric-label">Melhor ataque</span>
  </div>

  </section>

  

	<section id="tab-games" class="tab-panel active">
    <section class="filters">

    <select id="groupFilter">
      <option value="ALL">Todos os grupos</option>
    </select>

    <select id="teamFilter">
      <option value="ALL">Todas as seleções</option>
    </select>

    </section>
	  <section id="gamesContainer"></section>
	</section>

	<section id="tab-groups" class="tab-panel">
	  <section id="standingsContainer"></section>
	</section>

	<section id="tab-knockout" class="tab-panel">
	  <section id="knockoutContainer"></section>
	  <section id="fullBracket"></section>
	  <section id="championContainer"></section>
	</section>

	<section id="tab-stats" class="tab-panel">
  <section id="statsContainer"></section>
  </section>

</main>

<div id="toast"></div>

<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/stats.js"></script>
<script src="js/standings.js"></script>
<script src="js/knockout.js"></script>
<script src="js/render.js"></script>
<script src="js/share.js"></script>
<script src="js/app.js"></script>

</body>
</html>
